<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Property Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#F4F1EA; font-family:'Hanken Grotesk',sans-serif;
    display:flex; justify-content:center; min-height:100vh; color:#2A2A24;
  }
  .grain { position:fixed; inset:0; width:100%; height:100%; pointer-events:none;
    opacity:.5; mix-blend-mode:multiply; z-index:1; }
  .phone {
    width:100%; max-width:430px; background:#F4F1EA; position:relative;
    padding-bottom:120px; box-shadow:0 0 80px rgba(42,42,36,.08); overflow-x:hidden;
  }

  /* entrance */
  .enter { opacity:0; transform:translateY(14px);
    transition:opacity .7s ease var(--d,0s), transform .7s cubic-bezier(.2,.7,.2,1) var(--d,0s); }
  body.loaded .enter { opacity:1; transform:none; }

  /* hero */
  .hero { position:relative; height:280px; }
  .hero-bg { position:absolute; inset:0;
    background:linear-gradient(155deg,#3A5A47 0%,#2F4A3C 55%,#243a2f 100%); }
  .hero-arcs { position:absolute; inset:0; width:100%; height:100%; opacity:.12; }
  .hero-content { position:relative; padding:54px 24px 0; z-index:2; }
  .hero-loc { display:flex; align-items:center; gap:7px;
    font-weight:500; font-size:13px; color:rgba(255,255,255,.7); }
  .hero-title { margin-top:8px; font-family:'Fraunces',serif; font-weight:500;
    font-size:34px; color:#F4F1EA; letter-spacing:-.5px; }
  .price-chip { margin-top:10px; display:inline-flex; align-items:center; gap:8px;
    padding:7px 14px; border-radius:999px; background:rgba(255,255,255,.12);
    backdrop-filter:blur(4px); }
  .price-chip span { font-weight:600; font-size:14px; color:#F4F1EA; }

  /* score card */
  .score-wrap { padding:0 18px; margin-top:-54px; position:relative; z-index:3; }
  .score-card { background:#FBFAF6; border-radius:28px; padding:22px 22px 8px;
    border:1px solid rgba(42,42,36,.06); box-shadow:0 12px 40px rgba(36,58,47,.12); }
  .score-head { display:flex; align-items:center; gap:18px; }
  .gauge { position:relative; width:96px; height:96px; flex-shrink:0; }
  .gauge svg { transform:rotate(-90deg); }
  .gauge-num { position:absolute; inset:0; display:grid; place-items:center;
    font-family:'Fraunces',serif; font-weight:600; font-size:30px; color:#2F4A3C; }
  .score-title { font-weight:600; font-size:17px; }
  .score-sub { font-weight:500; font-size:13px; color:#7C9885; margin-top:2px; }
  .conf-chip { margin-top:8px; display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border-radius:999px; background:rgba(94,130,104,.10);
    font-weight:500; font-size:11.5px; color:#5E8268; }
  .radar-box { height:250px; margin-top:4px; }

  /* sections */
  h2.section { margin:0 0 12px; font-family:'Fraunces',serif; font-weight:500;
    font-size:20px; }
  .why { padding:22px 18px 4px; }
  .why-list { display:flex; flex-direction:column; gap:9px; }
  .why-item { display:flex; gap:10px; align-items:flex-start;
    font-weight:500; font-size:14px; line-height:1.45; }
  .why-item .dot { width:7px; height:7px; border-radius:9px; margin-top:6px; flex-shrink:0; }
  .why-item.good { color:#4A4A40; } .why-item.good .dot { background:#5E8268; }
  .why-item.drag { color:#8A8578; } .why-item.drag .dot { background:#C08A5A; }

  .layers { padding:16px 18px 0; display:flex; flex-direction:column; gap:12px; }
  .layer { background:#FBFAF6; border-radius:22px; overflow:hidden;
    border:1px solid rgba(42,42,36,.06); box-shadow:0 1px 2px rgba(42,42,36,.03); }
  .layer-head { width:100%; display:flex; align-items:center; gap:14px;
    padding:18px 20px; background:none; border:none; cursor:pointer; text-align:left; }
  .layer-ico { width:42px; height:42px; border-radius:13px; flex-shrink:0;
    display:grid; place-items:center; background:rgba(94,130,104,.10); color:#3A5A47; }
  .layer-meta { flex:1; }
  .layer-title { font-weight:600; font-size:15.5px; color:#2A2A24; }
  .layer-conf { font-weight:500; font-size:11.5px; color:#9A9A8C; margin-top:2px; }
  .layer-score { font-weight:600; font-size:16px; margin-right:4px; }
  .chev { color:#9A9A8C; transition:transform .35s ease; }
  .layer.open .chev { transform:rotate(180deg); }
  .layer-body { display:grid; grid-template-rows:0fr;
    transition:grid-template-rows .4s cubic-bezier(.4,0,.2,1); }
  .layer.open .layer-body { grid-template-rows:1fr; }
  .layer-body > div { overflow:hidden; }
  .layer-inner { padding:0 20px 20px; }
  .row { display:flex; align-items:center; gap:11px; padding:9px 0;
    border-top:1px solid rgba(42,42,36,.05); }
  .row .ri { color:#7C9885; flex-shrink:0; }
  .row .rl { flex:1; font-weight:500; font-size:13.5px; color:#4A4A40; }
  .row .rmode { color:#9A9A8C; }
  .row .rv { font-weight:600; font-size:13.5px; color:#2A2A24; }

  /* action bar */
  .bar { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center;
    padding:14px 18px calc(14px + env(safe-area-inset-bottom)); z-index:10;
    background:linear-gradient(to top,#F4F1EA 70%,rgba(244,241,234,0)); }
  .bar-inner { width:100%; max-width:394px; display:flex; gap:10px; }
  .btn { height:54px; border-radius:17px; cursor:pointer; border:1px solid rgba(42,42,36,.08);
    background:#FBFAF6; display:flex; align-items:center; justify-content:center;
    transition:all .25s ease; }
  .btn-icon { width:54px; flex-shrink:0; color:#8A8578; }
  .btn-icon.saved { background:#C08A5A; border-color:#C08A5A; color:#fff; }
  .btn-compare { flex:1; gap:9px; font-weight:600; font-size:15px; color:#4A4A40; }
  .btn-compare.on { background:rgba(94,130,104,.14); border-color:#5E8268; color:#3A5A47; }
  .btn-share { width:54px; flex-shrink:0; background:#2F4A3C; border:none; color:#F4F1EA; }
  svg.ic { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.8;
    stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<svg class="grain"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#g)" opacity="0.025"/></svg>

<div class="phone">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <svg class="hero-arcs" viewBox="0 0 430 280"><circle cx="360" cy="60" r="150" fill="none" stroke="#fff" stroke-width="1"/><circle cx="360" cy="60" r="220" fill="none" stroke="#fff" stroke-width="1"/></svg>
    <div class="hero-content">
      <div class="hero-loc enter" style="--d:.05s">
        <svg class="ic" style="width:15px;height:15px;stroke:rgba(255,255,255,.7)" viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Lagos, Nigeria</span>
      </div>
      <h1 class="hero-title enter" style="--d:.12s">Lekki Phase 1</h1>
      <div class="price-chip enter" style="--d:.18s">
        <svg class="ic" style="width:14px;height:14px;stroke:#E4D7C2" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M16 12h.01"/></svg>
        <span>₦75M – ₦85M</span>
      </div>
    </div>
  </div>

  <!-- SCORE + RADAR -->
  <div class="score-wrap">
    <div class="score-card enter" style="--d:.25s">
      <div class="score-head">
        <div class="gauge">
          <svg viewBox="0 0 96 96">
            <circle cx="48" cy="48" r="42" fill="none" stroke="rgba(94,130,104,.15)" stroke-width="7"/>
            <circle id="gauge-arc" cx="48" cy="48" r="42" fill="none" stroke="#5E8268" stroke-width="7" stroke-linecap="round"/>
          </svg>
          <div class="gauge-num" id="gauge-num">0</div>
        </div>
        <div>
          <div class="score-title">Fit Score</div>
          <div class="score-sub">A strong match for you</div>
          <div class="conf-chip">
            <svg class="ic" style="width:12px;height:12px;stroke:#5E8268" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            Based on 5 of 5 factors
          </div>
        </div>
      </div>
      <div class="radar-box"><svg id="radar" viewBox="0 0 300 300" width="100%" height="100%"></svg></div>
    </div>
  </div>

  <!-- WHY -->
  <div class="why enter" style="--d:.4s">
    <h2 class="section">Why this score</h2>
    <div class="why-list" id="why-list"></div>
  </div>

  <!-- LAYERS -->
  <div class="layers enter" style="--d:.54s" id="layers"></div>
</div>

<!-- ACTION BAR -->
<div class="bar">
  <div class="bar-inner">
    <button class="btn btn-icon" id="save-btn" aria-label="Save">
      <svg class="ic" id="heart" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
    </button>
    <button class="btn btn-compare" id="compare-btn">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/></svg>
      <span id="compare-label">Compare</span>
    </button>
    <button class="btn btn-share" aria-label="Share">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
    </button>
  </div>
</div>

<script>
/* ---------- data ---------- */
const FIT = 83;
const DIMS = [
  { label:"Flood safety",  score:74 },
  { label:"Schools",       score:100 },
  { label:"Affordability", score:65 },
  { label:"Worship",       score:100 },
  { label:"Air quality",   score:79 },
];
const ICONS = {
  droplets:'<path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5S5 13 5 15a7 7 0 0 0 7 7z"/>',
  wind:'<path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/>',
  shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
  grad:'<path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/>',
  landmark:'<line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/>',
  basket:'<path d="m5 11 4-7"/><path d="m19 11-4-7"/><path d="M2 11h20"/><path d="m3.5 11 1.6 7.4a2 2 0 0 0 2 1.6h9.8a2 2 0 0 0 2-1.6l1.6-7.4"/>',
  steth:'<path d="M4 3v6a4 4 0 0 0 8 0V3"/><circle cx="18" cy="15" r="3"/><path d="M12 13a6 6 0 0 0 6 2"/>',
  wallet:'<path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M16 12h.01"/>',
  foot:'<ellipse cx="8.5" cy="9" rx="2.4" ry="3.8"/><ellipse cx="15.5" cy="15" rx="2.4" ry="3.8"/>',
  car:'<path d="M5 13l1.3-4a2 2 0 0 1 1.9-1.3h7.6A2 2 0 0 1 17.7 9L19 13"/><path d="M3 13h18v4a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-1H6v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/>',
  chev:'<path d="m6 9 6 6 6-6"/>'
};
const ic = (n,sz=20,color="currentColor")=>`<svg class="ic" style="width:${sz}px;height:${sz}px;stroke:${color}" viewBox="0 0 24 24">${ICONS[n]}</svg>`;
const scoreColor = s => s>=80?"#5E8268":s>=60?"#A98B4E":s>=40?"#C08A5A":"#B5705A";

const LAYERS = [
  { id:"risk", icon:"droplets", title:"Risk & environment", score:76, conf:"High confidence · NASA flood archive",
    rows:[["droplets","Flood — floods ~1 in 10 years","74",null],["wind","Air quality — PM2.5 moderate","79",null],["shield","Other hazards — low","88",null]] },
  { id:"daily", icon:"foot", title:"Daily life & proximity", score:96, conf:"High confidence · OpenStreetMap",
    rows:[["grad","Primary school","8 min","walk"],["landmark","Mosque","4 min","walk"],["basket","Daily market","11 min","walk"],["steth","Hospital","14 min","drive"]] },
  { id:"live", icon:"shield", title:"Livability", score:70, conf:"City-level data · lower precision",
    rows:[["shield","Safety (city-level)","72",null],["foot","Walkability","81",null]] },
  { id:"cost", icon:"wallet", title:"Cost", score:65, conf:"Neighborhood price band",
    rows:[["wallet","Vs. your budget","Near ceiling",null],["wallet","Vs. local market","Slightly below avg",null]] },
];
const BOOST = ["Flooding here is rare — about 1 in 10 years","A mosque is a 4-minute walk away","Primary school within an 8-minute walk"];
const DRAG = ["Price sits close to your budget ceiling","Air quality is moderate, not pristine"];

/* ---------- render why ---------- */
document.getElementById("why-list").innerHTML =
  BOOST.map(t=>`<div class="why-item good"><span class="dot"></span><span>${t}</span></div>`).join("") +
  DRAG.map(t=>`<div class="why-item drag"><span class="dot"></span><span>${t}</span></div>`).join("");

/* ---------- render layers ---------- */
document.getElementById("layers").innerHTML = LAYERS.map(L=>`
  <div class="layer ${L.id==='daily'?'open':''}" data-id="${L.id}">
    <button class="layer-head">
      <span class="layer-ico">${ic(L.icon,20)}</span>
      <span class="layer-meta"><span class="layer-title">${L.title}</span><span class="layer-conf">${L.conf}</span></span>
      <span class="layer-score" style="color:${scoreColor(L.score)}">${L.score}</span>
      <span class="chev">${ic("chev",18)}</span>
    </button>
    <div class="layer-body"><div><div class="layer-inner">
      ${L.rows.map(r=>`<div class="row">${ic(r[0],16,"#7C9885")}<span class="rl">${r[1]}</span>${r[3]?`<span class="rmode">${ic(r[3]==='walk'?'foot':'car',14,'#9A9A8C')}</span>`:''}<span class="rv">${r[2]}</span></div>`).join("")}
    </div></div></div>
  </div>`).join("");

document.querySelectorAll(".layer-head").forEach(h=>{
  h.addEventListener("click",()=>{
    const layer = h.parentElement;
    const wasOpen = layer.classList.contains("open");
    document.querySelectorAll(".layer").forEach(l=>l.classList.remove("open"));
    if(!wasOpen) layer.classList.add("open");
  });
});

/* ---------- radar ---------- */
const R = document.getElementById("radar");
const cx=150, cy=150, maxR=108, n=DIMS.length;
const ang = i => (-90 + i*360/n) * Math.PI/180;
const pt = (i,r)=>[cx+r*Math.cos(ang(i)), cy+r*Math.sin(ang(i))];
const ring = f => DIMS.map((_,i)=>pt(i,maxR*f).join(",")).join(" ");
let radarSVG = "";
[0.25,0.5,0.75,1].forEach(f=> radarSVG += `<polygon points="${ring(f)}" fill="none" stroke="rgba(47,74,60,.10)" stroke-width="1"/>`);
DIMS.forEach((_,i)=>{ const [x,y]=pt(i,maxR); radarSVG += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(47,74,60,.10)" stroke-width="1"/>`; });
radarSVG += `<polygon id="rdata" fill="rgba(94,130,104,.22)" stroke="#5E8268" stroke-width="2.5" stroke-linejoin="round"/>`;
radarSVG += `<g id="rdots"></g>`;
DIMS.forEach((d,i)=>{ const [x,y]=pt(i,maxR+26); radarSVG += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" style="font:600 11px 'Hanken Grotesk',sans-serif;fill:#6B6B5E">${d.label}</text>`; });
R.innerHTML = radarSVG;
const rdata=document.getElementById("rdata"), rdots=document.getElementById("rdots");

/* ---------- animate ---------- */
const arc=document.getElementById("gauge-arc"), gnum=document.getElementById("gauge-num");
const CIRC = 2*Math.PI*42;
function frame(p){
  const live = Math.round(FIT*p);
  gnum.textContent = live;
  arc.setAttribute("stroke-dasharray", CIRC);
  arc.setAttribute("stroke-dashoffset", CIRC*(1-live/100));
  rdata.setAttribute("points", DIMS.map((d,i)=>pt(i,maxR*(d.score/100)*p).join(",")).join(" "));
  rdots.innerHTML = DIMS.map((d,i)=>{ const [x,y]=pt(i,maxR*(d.score/100)*p); return `<circle cx="${x}" cy="${y}" r="4.5" fill="#5E8268" stroke="#FBFAF6" stroke-width="2"/>`; }).join("");
}
frame(0);
window.addEventListener("load",()=>{
  document.body.classList.add("loaded");
  const dur=1400, start=performance.now()+250;
  function tick(now){
    const t=Math.min(1,Math.max(0,(now-start)/dur));
    frame(1-Math.pow(1-t,3));
    if(t<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
});

/* ---------- buttons ---------- */
let saved=false, comparing=false;
const saveBtn=document.getElementById("save-btn"), heart=document.getElementById("heart");
saveBtn.addEventListener("click",()=>{ saved=!saved; saveBtn.classList.toggle("saved",saved);
  heart.style.fill = saved?"#fff":"none"; });
const cmpBtn=document.getElementById("compare-btn"), cmpLbl=document.getElementById("compare-label");
cmpBtn.addEventListener("click",()=>{ comparing=!comparing; cmpBtn.classList.toggle("on",comparing);
  cmpLbl.textContent = comparing?"Added to compare":"Compare"; });
</script>
</body>
</html>
