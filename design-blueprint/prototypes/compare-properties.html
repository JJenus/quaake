<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compare Properties</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F4F1EA; font-family:'Hanken Grotesk',sans-serif;
    display:flex; justify-content:center; min-height:100vh; color:#2A2A24; }
  .grain { position:fixed; inset:0; width:100%; height:100%; pointer-events:none;
    opacity:.5; mix-blend-mode:multiply; z-index:1; }
  .phone { width:100%; max-width:430px; background:#F4F1EA; position:relative;
    padding:0 0 40px; box-shadow:0 0 80px rgba(42,42,36,.08); overflow-x:hidden; }

  .enter { opacity:0; transform:translateY(14px);
    transition:opacity .7s ease var(--d,0s), transform .7s cubic-bezier(.2,.7,.2,1) var(--d,0s); }
  body.loaded .enter { opacity:1; transform:none; }

  /* top bar */
  .top { padding:54px 22px 18px; display:flex; align-items:flex-end; justify-content:space-between; }
  .top h1 { font-family:'Fraunces',serif; font-weight:500; font-size:30px; letter-spacing:-.5px; }
  .top .count { font-weight:500; font-size:13px; color:#9A9A8C; margin-top:4px; }
  .top .hint { font-weight:500; font-size:12px; color:#7C9885; }

  /* property header cards */
  .cards { display:flex; gap:10px; padding:0 18px; }
  .pcard { flex:1; background:#FBFAF6; border-radius:20px; padding:14px 12px 16px;
    border:1px solid rgba(42,42,36,.06); box-shadow:0 1px 2px rgba(42,42,36,.03);
    cursor:pointer; position:relative; transition:transform .25s ease, box-shadow .25s ease, opacity .3s ease; }
  .pcard .swatch { width:26px; height:5px; border-radius:9px; margin-bottom:9px; }
  .pcard .pname { font-family:'Fraunces',serif; font-weight:600; font-size:15px; line-height:1.1; }
  .pcard .parea { font-weight:500; font-size:10.5px; color:#9A9A8C; margin-top:2px; }
  .pcard .pprice { font-weight:600; font-size:11px; color:#6B6B5E; margin-top:8px; }
  .pcard .pscore { font-family:'Fraunces',serif; font-weight:600; font-size:30px; margin-top:6px; line-height:1; }
  .pcard .plabel { font-weight:500; font-size:10px; color:#9A9A8C; text-transform:uppercase; letter-spacing:.5px; }
  .pcard.dim { opacity:.45; }
  .pcard.focus { box-shadow:0 8px 26px rgba(36,58,47,.14); transform:translateY(-2px); }
  .pcard.focus::after { content:""; position:absolute; inset:0; border-radius:20px;
    border:1.5px solid var(--clr); pointer-events:none; }

  /* radar */
  .radar-card { margin:16px 18px 0; background:#FBFAF6; border-radius:24px; padding:10px 10px 4px;
    border:1px solid rgba(42,42,36,.06); box-shadow:0 4px 18px rgba(36,58,47,.06); }
  .radar-box { height:270px; }
  .legend { display:flex; justify-content:center; gap:16px; padding:0 0 10px; flex-wrap:wrap; }
  .legend span { display:inline-flex; align-items:center; gap:6px; font-weight:500; font-size:11.5px; color:#6B6B5E; }
  .legend i { width:9px; height:9px; border-radius:9px; display:inline-block; }

  /* summary */
  .summary { margin:18px 18px 0; }
  .summary h2 { font-family:'Fraunces',serif; font-weight:500; font-size:20px; margin-bottom:12px; }
  .sum-item { display:flex; gap:11px; align-items:flex-start; padding:11px 14px; border-radius:16px;
    background:#FBFAF6; border:1px solid rgba(42,42,36,.05); margin-bottom:9px; }
  .sum-item .sw { width:9px; height:9px; border-radius:9px; margin-top:5px; flex-shrink:0; }
  .sum-item p { font-weight:500; font-size:13.5px; line-height:1.45; color:#4A4A40; }
  .sum-item b { font-weight:700; color:#2A2A24; }

  /* matrix toggle + matrix */
  .matrix-wrap { margin:18px 18px 0; }
  .mtoggle { width:100%; display:flex; align-items:center; justify-content:center; gap:8px;
    padding:14px; border-radius:16px; background:#2F4A3C; color:#F4F1EA; border:none; cursor:pointer;
    font-weight:600; font-size:14px; }
  .mtoggle svg { transition:transform .35s ease; }
  .matrix-wrap.open .mtoggle svg { transform:rotate(180deg); }
  .mbody { display:grid; grid-template-rows:0fr; transition:grid-template-rows .45s cubic-bezier(.4,0,.2,1); }
  .matrix-wrap.open .mbody { grid-template-rows:1fr; }
  .mbody > div { overflow:hidden; }
  table { width:100%; border-collapse:collapse; margin-top:12px;
    background:#FBFAF6; border-radius:18px; overflow:hidden; border:1px solid rgba(42,42,36,.06); }
  th, td { padding:11px 8px; text-align:center; font-size:13px; }
  th.rowlab, td.rowlab { text-align:left; padding-left:14px; font-weight:600; color:#4A4A40; font-size:12.5px; }
  thead th { font-family:'Fraunces',serif; font-weight:600; font-size:13px; padding:14px 6px 12px; }
  thead i { display:block; width:8px; height:8px; border-radius:9px; margin:5px auto 0; }
  tbody tr { border-top:1px solid rgba(42,42,36,.05); }
  td .val { font-weight:600; font-size:14px; color:#6B6B5E; }
  td.win .val { color:#2A2A24; }
  td.win { position:relative; }
  td.win .crown { font-size:9px; color:#7C9885; display:block; margin-top:1px; font-weight:700; letter-spacing:.3px; }
  tr.overall { border-top:2px solid rgba(42,42,36,.10); }
  tr.overall td.rowlab { font-family:'Fraunces',serif; }
  tr.overall .val { font-size:16px; }

  svg.ic { fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<svg class="grain"><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#g)" opacity="0.025"/></svg>

<div class="phone">
  <div class="top enter" style="--d:.05s">
    <div><h1>Compare</h1><div class="count">3 properties · weighted to you</div></div>
    <div class="hint">tap a card to focus</div>
  </div>

  <div class="cards enter" style="--d:.12s" id="cards"></div>

  <div class="radar-card enter" style="--d:.2s">
    <div class="radar-box"><svg id="radar" viewBox="0 0 300 300" width="100%" height="100%"></svg></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="summary enter" style="--d:.34s">
    <h2>Best for you</h2>
    <div id="summary"></div>
  </div>

  <div class="matrix-wrap enter" style="--d:.42s" id="matrix-wrap">
    <button class="mtoggle" id="mtoggle">
      <span id="mtoggle-label">Show full breakdown</span>
      <svg class="ic" width="18" height="18" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="mbody"><div><div id="matrix"></div></div></div>
  </div>
</div>

<script>
/* ---------- data ---------- */
const DIMLABELS = ["Flood safety","Schools","Affordability","Worship","Air quality"];
const PROPS = [
  { name:"Lekki Phase 1", area:"Lagos", price:"₦75–85M", fit:83, color:"#5E8268",
    scores:[74,100,65,100,79] },
  { name:"Yaba",          area:"Lagos", price:"₦45–55M", fit:75, color:"#C08A5A",
    scores:[55,90,88,80,60] },
  { name:"Ikoyi",         area:"Lagos", price:"₦140–160M", fit:77, color:"#6E8CA0",
    scores:[88,95,40,70,84] },
];
const SUMMARY = [
  [0,"<b>Lekki Phase 1</b> has the highest overall fit — best for school and worship proximity."],
  [2,"<b>Ikoyi</b> is the safest from floods with the cleanest air, but it's the priciest by far."],
  [1,"<b>Yaba</b> is the most affordable and central, but it floods more often and air quality is poorer."],
];

/* ---------- cards ---------- */
let focus = null;
const cardsEl = document.getElementById("cards");
cardsEl.innerHTML = PROPS.map((p,i)=>`
  <div class="pcard" data-i="${i}" style="--clr:${p.color}">
    <div class="swatch" style="background:${p.color}"></div>
    <div class="pname">${p.name}</div>
    <div class="parea">${p.area} · ${p.price}</div>
    <div class="pscore" data-fit="${p.fit}" style="color:${p.color}">0</div>
    <div class="plabel">Fit Score</div>
  </div>`).join("");

/* ---------- legend ---------- */
document.getElementById("legend").innerHTML = PROPS.map(p=>
  `<span><i style="background:${p.color}"></i>${p.name}</span>`).join("");

/* ---------- summary ---------- */
document.getElementById("summary").innerHTML = SUMMARY.map(([i,t])=>
  `<div class="sum-item"><span class="sw" style="background:${PROPS[i].color}"></span><p>${t}</p></div>`).join("");

/* ---------- matrix ---------- */
function buildMatrix(){
  const winners = DIMLABELS.map((_,r)=>{
    let mx=-1,wi=0; PROPS.forEach((p,i)=>{ if(p.scores[r]>mx){mx=p.scores[r];wi=i;} }); return wi;
  });
  const fitWin = PROPS.reduce((b,p,i)=> p.fit>PROPS[b].fit?i:b, 0);
  let html = `<table><thead><tr><th class="rowlab"></th>`;
  PROPS.forEach(p=> html += `<th>${p.name}<i style="background:${p.color}"></i></th>`);
  html += `</tr></thead><tbody>`;
  DIMLABELS.forEach((lab,r)=>{
    html += `<tr><td class="rowlab">${lab}</td>`;
    PROPS.forEach((p,i)=>{
      const win = winners[r]===i;
      html += `<td class="${win?'win':''}" style="${win?`background:${p.color}1A`:''}">
        <span class="val">${p.scores[r]}</span>${win?'<span class="crown">BEST</span>':''}</td>`;
    });
    html += `</tr>`;
  });
  html += `<tr class="overall"><td class="rowlab">Overall fit</td>`;
  PROPS.forEach((p,i)=>{
    const win = fitWin===i;
    html += `<td class="${win?'win':''}" style="${win?`background:${p.color}1A`:''}">
      <span class="val">${p.fit}</span>${win?'<span class="crown">BEST</span>':''}</td>`;
  });
  html += `</tr></tbody></table>`;
  document.getElementById("matrix").innerHTML = html;
}
buildMatrix();

const mw = document.getElementById("matrix-wrap");
document.getElementById("mtoggle").addEventListener("click",()=>{
  const open = mw.classList.toggle("open");
  document.getElementById("mtoggle-label").textContent = open?"Hide breakdown":"Show full breakdown";
});

/* ---------- radar ---------- */
const R=document.getElementById("radar");
const cx=150, cy=150, maxR=104, n=DIMLABELS.length;
const ang=i=>(-90+i*360/n)*Math.PI/180;
const pt=(i,r)=>[cx+r*Math.cos(ang(i)), cy+r*Math.sin(ang(i))];
const ring=f=>DIMLABELS.map((_,i)=>pt(i,maxR*f).join(",")).join(" ");
let s="";
[0.25,0.5,0.75,1].forEach(f=> s+=`<polygon points="${ring(f)}" fill="none" stroke="rgba(47,74,60,.10)" stroke-width="1"/>`);
DIMLABELS.forEach((_,i)=>{ const[x,y]=pt(i,maxR); s+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(47,74,60,.10)" stroke-width="1"/>`; });
PROPS.forEach((p,i)=> s+=`<polygon class="rpoly" data-i="${i}" fill="${p.color}" fill-opacity="0.14" stroke="${p.color}" stroke-width="2.2" stroke-linejoin="round"/>`);
DIMLABELS.forEach((lab,i)=>{ const[x,y]=pt(i,maxR+24); s+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" style="font:600 10.5px 'Hanken Grotesk',sans-serif;fill:#6B6B5E">${lab}</text>`; });
R.innerHTML=s;
const polys=[...document.querySelectorAll(".rpoly")];

function drawRadar(prog){
  PROPS.forEach((p,i)=>{
    polys[i].setAttribute("points", p.scores.map((v,j)=>pt(j,maxR*(v/100)*prog).join(",")).join(","));
  });
}
function applyFocus(){
  PROPS.forEach((p,i)=>{
    const card = cardsEl.querySelector(`.pcard[data-i="${i}"]`);
    if(focus===null){
      polys[i].setAttribute("fill-opacity","0.14"); polys[i].setAttribute("stroke-opacity","1");
      card.classList.remove("dim","focus");
    } else if(focus===i){
      polys[i].setAttribute("fill-opacity","0.30"); polys[i].setAttribute("stroke-opacity","1");
      polys[i].setAttribute("stroke-width","3");
      card.classList.add("focus"); card.classList.remove("dim");
    } else {
      polys[i].setAttribute("fill-opacity","0.04"); polys[i].setAttribute("stroke-opacity","0.3");
      polys[i].setAttribute("stroke-width","2.2");
      card.classList.add("dim"); card.classList.remove("focus");
    }
  });
}
cardsEl.querySelectorAll(".pcard").forEach(c=>{
  c.addEventListener("click",()=>{
    const i=+c.dataset.i; focus = focus===i?null:i; applyFocus();
  });
});

/* ---------- animate ---------- */
const fitEls=[...document.querySelectorAll(".pscore")];
drawRadar(0);
window.addEventListener("load",()=>{
  document.body.classList.add("loaded");
  const dur=1400, start=performance.now()+250;
  function tick(now){
    const t=Math.min(1,Math.max(0,(now-start)/dur));
    const e=1-Math.pow(1-t,3);
    drawRadar(e);
    fitEls.forEach(el=> el.textContent=Math.round((+el.dataset.fit)*e));
    if(t<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
});
</script>
</body>
</html>
