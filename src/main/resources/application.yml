spring:
  application:
    name: homefit
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/homefit?stringtype=unspecified}
    username: ${DB_USER:homefit}
    password: ${DB_PASSWORD:homefit}
  jpa:
    hibernate:
      ddl-auto: none        # schema is owned by Flyway, never by Hibernate
    open-in-view: false
  flyway:
    enabled: true
    schemas: ingest,app     # Flyway manages both schemas; ingest is the contract
    default-schema: ingest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith

# Profiles select the runtime role of this one jar (see backend-systems-design.md, Stage 1):
#   --spring.profiles.active=api     -> serve HTTP only (default behaviour here)
#   --spring.profiles.active=worker  -> run scheduled ingestion only
---
spring:
  config:
    activate:
      on-profile: worker
# (web stays up but the SubScoreComputeJob @Scheduled bean only activates under 'worker')
